<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JS-DOM-Manipulation</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
<div id="app-container" class="conatainer d-flex flex-column align-items-start mt-3 ps-4">


  <h1 id="title" class="mb-4">
    Ласкаво просимо до маніпуляції DOM!
  </h1>

  <button id="change-text-btn" class="btn btn-primary mb-3">
    Змінити заголовок
  </button>

  <img id="image" src="https://placehold.co/300x300" class="rounded mb-3">

  <button id="toggle-image-btn" class="btn btn-secondary mb-3">
    Перемкнути стиль зображення
  </button>

  <p id="description" class="mb-3">
    Це стандартний текст опису.
  </p>

  <button id="update-description-btn" class="btn btn-success">
    Оновити опис
  </button>


</div>
<script src="script.js"></script>
</body>
</html>
